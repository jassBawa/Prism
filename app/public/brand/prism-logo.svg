<svg xmlns="http://www.w3.org/2000/svg" width="448" height="168" viewBox="0 0 448 168" fill="none" role="img" aria-label="Prism — Index funds on Solana">
  <defs>
    <linearGradient id="prism-logo-bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#334155"/>
      <stop offset="1" stop-color="#0B1220"/>
    </linearGradient>
    <clipPath id="prism-logo-glyph">
      <rect x="176" y="130" width="66" height="252" rx="22"/>
      <path d="M204 130 H292 a90 90 0 0 1 0 180 H204 Z M242 172 H292 a48 48 0 0 1 0 96 H242 Z" clip-rule="evenodd"/>
    </clipPath>
  </defs>

  <!-- icon -->
  <g transform="translate(24 26) scale(0.21875)">
    <rect width="512" height="512" rx="116" fill="url(#prism-logo-bg)"/>
    <g transform="translate(-22 0)">
      <rect x="176" y="130" width="66" height="252" rx="22" fill="#FFFFFF"/>
      <path d="M204 130 H292 a90 90 0 0 1 0 180 H204 Z M242 172 H292 a48 48 0 0 1 0 96 H242 Z" fill="#FFFFFF" fill-rule="evenodd"/>
      <polygon points="138,120 154,120 426,392 410,392" fill="#38BDF8" opacity="0.9" clip-path="url(#prism-logo-glyph)"/>
    </g>
  </g>

  <!-- wordmark -->
  <text x="166" y="92" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="74" font-weight="700" letter-spacing="-1.6" fill="#0F172A">Prism</text>
  <text x="168" y="126" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" font-size="15.5" font-weight="600" letter-spacing="2.1" fill="#64748B">INDEX FUNDS ON SOLANA</text>
</svg>
